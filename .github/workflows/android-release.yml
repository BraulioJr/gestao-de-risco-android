name: Android Release CI/CD

on:
  push:
    tags:
      - 'v*.*.*' # Aciona o workflow em tags como v1.0.0, v1.2.3, etc.

jobs:
  build-and-release:
    name: Build, Sign, and Release to Play Store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para obter todo o histórico para a contagem de commits do versionCode

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode Keystore and Setup Properties
        run: |
          echo "storeFile=release.jks" >> keystore.properties
          echo "keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.SIGNING_KEY_ALIAS_PASSWORD }}" >> keystore.properties
          echo "storePassword=${{ secrets.SIGNING_KEY_PASSWORD }}" >> keystore.properties
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > release.jks

      - name: Build and Sign Release APK
        run: ./gradlew assembleRelease

      # Passo comentado temporariamente até o pagamento da taxa de US$ 25
      # - name: Upload to Google Play
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
      #     packageName: com.example.project_gestoderisco
      #     releaseFiles: app/build/outputs/apk/release/app-release.apk
      #     track: internal # Mude para 'alpha', 'beta' ou 'production' conforme necessário

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}